shadow = false;
fading = false;

backend = "glx";

vsync = true;
no-frame-pacing = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;
unredir-if-possible = true;

dithered-present = false;

detect-client-opacity = true;
detect-transient = true;

log-level = "ERROR";
