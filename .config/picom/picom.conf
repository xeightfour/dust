shadow = false;
fading = false;

blur: {
	method = "dual_kawase";
	strength = 5;
};

blur-background-frame = true;

opacity-rule = [
	"88:class_g = 'Alacritty' && focused",
	"70:class_g = 'Alacritty' && !focused",
	"88:class_g = 'st-256color' && focused",
	"70:class_g = 'st-256color' && !focused"
];

blur-background-exclude = [
	"window_type = 'menu'",
	"window_type = 'dropdown_menu'",
	"window_type = 'popup_menu'",
	"window_type = 'tooltip'",
	"window_type = 'unknown'",
	"window_type = 'utility'",
	"_GTK_FRAME_EXTENTS@"
];

animations = ({
	triggers = [ "close", "hide" ];
	preset = "disappear";
}, {
	triggers = [ "open", "show" ];
	preset = "appear";
}, {
	triggers = [ "geometry" ];
	preset = "geometry-change";
	duration = 0.22;
}, {
	triggers = [ "increase-opacity" ];
	preset = "appear";
	scale = 1.0;
}, {
	triggers = [ "decrease-opacity" ];
	preset = "disappear";
	scale = 1.0;
})

backend = "glx";

vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;

dithered-present = false;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

log-level = "ERROR";
