shadow = false;
fading = false;

opacity-rule = [
	"92:class_g = 'Alacritty' && focused",
	"75:class_g = 'Alacritty' && !focused",
];

backend = "glx";

vsync = true;
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
xrender-sync-fence = true;

dithered-present = false;

detect-client-opacity = true;
detect-transient = true;

log-level = "ERROR";
