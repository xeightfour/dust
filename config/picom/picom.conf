shadow = false;
shadow-radius = 0;
shadow-offset-x = 0;
shadow-offset-y = 0;

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 3;

inactive-opacity = 1.0;
frame-opacity = 1.0;

focus-exclude = [
    "class_g = 'Cairo-clock'"
];

corner-radius = 0

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# xrender, glx, egl, xr_glx_hybrid
backend = "xrender";

dithered-present = false;

vsync = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

glx-no-stencil = true;

use-damage = true;

# trace, debug, info, warn, error
log-level = "warn";

# unknown, desktop, dock, toolbar, menu, utility, splash, dialog, normal, dropdown_menu, popup_menu, tooltip, notification, combo, dnd
# fade, shadow, opacity, focusk, full-shadow, clip-shadow-above
wintypes: { tooltip = { fade = true; focus = true; }; };
