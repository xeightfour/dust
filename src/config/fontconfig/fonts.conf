<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Dejavu Sans</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Dejavu Serif</string></test>
        <edit name="family" mode="assign" binding="same"><string>serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Dejavu Sans Mono</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Liberation Mono</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Courier New</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Courier</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Consolas</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Noto Mono</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Ubuntu Mono</string></test>
        <edit name="family" mode="assign" binding="same"><string>monospace</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Ubuntu</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Arial</string></test>
        <edit name="family" mode="assign" binding="same"><string>sans-serif</string></edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>Times New Roman</string></test>
        <edit name="family" mode="assign" binding="same"><string>serif</string></edit>
    </match>

    <match target="pattern">
        <test name="family" compare="eq">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="append" binding="strong">
            <string>Noto Sans</string>
            <string>Iranian Sans</string>
            <string>Noto emoji</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>serif</string>
        </test>
        <edit name="family" mode="append" binding="strong">
            <string>Noto Serif</string>
            <string>Iranian Serif</string>
            <string>Noto emoji</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq">
            <string>monospace</string>
        </test>
        <edit name="family" mode="append" binding="strong">
            <string>SX Mono</string>
            <string>Iranian Sans</string>
            <string>Noto emoji</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>sans-serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>ar</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>sans-serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>az</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>sans-serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>fa</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>ar</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Serif</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>az</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Serif</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>serif</string></test>
        <test qual="any" name="lang" compare="eq"><string>fa</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Serif</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>monospace</string></test>
        <test qual="any" name="lang" compare="eq"><string>ar</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>monospace</string></test>
        <test qual="any" name="lang" compare="eq"><string>az</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>

    <match target="pattern">
        <test qual="any" name="family" compare="eq"><string>monospace</string></test>
        <test qual="any" name="lang" compare="eq"><string>fa</string></test>
        <edit name="family" mode="append" binding="strong">
            <string>Iranian Sans</string>
        </edit>
    </match>
</fontconfig>
