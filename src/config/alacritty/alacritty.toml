# Import catppuccin
import = [ "~/.config/alacritty/catppuccin-mocha.toml" ]

[window]
# Window padding
padding = { x = 4, y = 4 }
dynamic_padding = true

[font]
# Font faces
normal = { family = "SX Mono", style = "Regular" }
bold = { family = "SX Mono", style = "Bold" }
italic = { family = "SX Mono", style = "Bold" }
bold_italic = { family = "SX Mono", style = "Bold" }
# Font size
size = 13.5
# Line spacing
offset = { x = 0, y = 2 }
glyph_offset = { x = 0, y = 1 }
