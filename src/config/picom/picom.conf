# Enabled client-side shadows on windows
shadow = false;

# The blur radius for shadows, in pixels
shadow-radius = 0;

# The left offset for shadows, in pixels
shadow-offset-x = 0;

# The top offset for shadows, in pixels
shadow-offset-y = 0;

# Specify a list of conditions of windows that should have no shadow
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fade windows in/out when opening/closing and when opacity changes, unless no-fading-openclose is used
fading = true;

# Opacity change between steps while fading in
fade-in-step = 0.03;

# Opacity change between steps while fading out
fade-out-step = 0.03;

# The time between steps in fade step, in milliseconds
fade-delta = 3;

# Opacity of inactive windows
inactive-opacity = 1.0;

# Opacity of window titlebars and borders
frame-opacity = 1.0;

# Specify a list of conditions of windows that should never be considered focused
focus-exclude = [ "class_g = 'Cairo-clock'" ];

# Sets the radius of rounded window corners
corner-radius = 0

# Exclude conditions for rounded corners
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# Exclude conditions for background blur
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Specify the backend to use either 'xrender', 'glx', 'egl' or 'xr_glx_hybrid'
backend = "xrender";

# Use higher precision during rendering, not recommended due to high gpu load
dithered-present = false;

# Enable/disable VSync
vsync = true;

# Try to detect WM windows and mark them as active
mark-wmwin-focused = true;

# Mark override-redirect windows that doesn't have a child window with 'WM_STATE' focused
mark-ovredir-focused = true;

# Try to detect windows with rounded corners and don't consider them shaped windows
detect-rounded-corners = true;

# Detect '_NET_WM_WINDOW_OPACITY' on client windows
# Useful for window managers not passing '_NET_WM_WINDOW_OPACITY' of client windows to frame windows
detect-client-opacity = true;

# Use 'WM_TRANSIENT_FOR' to group windows
detect-transient = true;

# GLX backend avoid using stencil buffer
glx-no-stencil = true;

# Disable the use of damage information. This cause the whole screen to be redrawn every time
use-damage = true;

# Set the log level. Possible values are: trace, debug, info, warn, error
log-level = "warn";

# Window type settings. Possible window types are:
# unknown, desktop, dock, toolbar, menu, utility, splash, dialog, normal, dropdown_menu, popup_menu, tooltip,
# notification, combo and dnd
# Following per window type options are available:
# fade, shadow, opacity, focusk, full-shadow, clip-shadow-above
wintypes: { tooltip = { fade = true; focus = true; }; };
